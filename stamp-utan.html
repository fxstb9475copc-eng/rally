<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スタンプ獲得 - utan</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    img { width: 80%; max-width: 300px; margin: 20px; }
  </style>
</head>
<body>
  <h2>スタンプ獲得！</h2>
  <img src="utan.png" alt="utan">

  <p>ゴリラコレクションはこちら：</p>
  <a href="gorilla.html?place=utan">コレクションを見る</a>

  <script>
    const place = "utan";
    let collected = JSON.parse(localStorage.getItem("gorillas") || "[]");
    if (!collected.includes(place)) {
      collected.push(place);
      localStorage.setItem("gorillas", JSON.stringify(collected));
    }
  </script>
</body>
</html>
