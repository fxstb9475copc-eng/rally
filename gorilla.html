<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ゴリラコレクション</title>
  <style>
    body { text-align: center; font-family: sans-serif; }
    img { width: 80%; max-width: 300px; margin: 20px; }

    .collection {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 400px;
      margin: 0 auto;
    }

    .collection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <div id="single"></div>

  <div id="collection" style="display:none;">
    <h2>コンプリート！</h2>
    <div class="collection" id="allImages"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const place = params.get("place");

    const gorillas = {
      forest: "forest.png", // 左上
      view:   "view.png",   // 右上
      main:   "main.png",   // 左下
      utan:   "utan.png"    // 右下
    };

    let collected = JSON.parse(localStorage.getItem("gorillas") || "[]");

    if (place && !collected.includes(place)) {
      collected.push(place);
      localStorage.setItem("gorillas", JSON.stringify(collected));
    }

    if (collected.length === 4) {
      document.getElementById("single").style.display = "none";
      document.getElementById("collection").style.display = "block";

      const order = ["forest", "view", "main", "utan"];
      let html = "";
      order.forEach(p => {
        html += `<img src="${gorillas[p]}">`;
      });
      document.getElementById("allImages").innerHTML = html;

    } else {
      if (place) {
        document.getElementById("single").innerHTML =
          `<h2>スタンプ獲得！</h2><img src="${gorillas[place]}">`;
      } else {
        document.getElementById("single").innerHTML =
          `<p>まだスタンプが集まっていません。</p>`;
      }
    }
  </script>
</body>
</html>
